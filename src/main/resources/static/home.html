<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel de Teste da API</title>

    <style>
        * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
          font-family: Arial;
        }

        body {
          display: flex;
          height: 100vh;
          background: #f4f6f9;
        }

        /* MENU */
        .sidebar {
          width: 220px;
          background: #111827;
          color: white;
          padding: 20px;
        }

        .sidebar h2 {
          margin-bottom: 20px;
        }

        .sidebar button {
          width: 100%;
          padding: 10px;
          margin-bottom: 10px;
          background: #1f2937;
          border: none;
          color: white;
          cursor: pointer;
          border-radius: 6px;
        }

        .sidebar button:hover {
          background: #374151;
        }

        /* CONTEÚDO */
        .main {
          flex: 1;
          padding: 20px;
        }

        .card {
          background: white;
          padding: 20px;
          border-radius: 10px;
          max-width: 650px;
          box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        input {
          width: 100%;
          padding: 10px;
          margin-bottom: 10px;
          border-radius: 6px;
          border: 1px solid #ddd;
        }

        button.action {
          width: 100%;
          padding: 10px;
          background: #2563eb;
          color: white;
          border: none;
          border-radius: 6px;
          cursor: pointer;
        }

        .section { display: none; }
        .active { display: block; }

        label { display: block; margin-bottom: 5px; }
    </style>
</head>

<body>

<div class="sidebar">
    <h2>PAINEL API</h2>

    <button onclick="abrir('produto')">Produto</button>
    <button onclick="abrir('categoria')">Categoria</button>
</div>

<div class="main">

    <!-- PRODUTO -->
    <div id="produto" class="section active">
        <div class="card">

            <h2>Produto</h2>

            <select id="acaoProduto" onchange="renderProduto()">
                <option value="buscar">Buscar por ID</option>
                <option value="criar">Criar</option>
                <option value="deletar">Deletar</option>
            </select>

            <div id="formProduto"></div>

        </div>
    </div>

    <!-- CATEGORIA -->
    <div id="categoria" class="section">
        <div class="card">

            <h2>Categoria</h2>

            <select id="acaoCategoria" onchange="renderCategoria()">
                <option value="buscar">Buscar por ID</option>
                <option value="criar">Criar</option>
                <option value="deletar">Deletar</option>
            </select>

            <div id="formCategoria"></div>

        </div>
    </div>

</div>

<script>

    const API = "http://localhost:8080";

    /* MENU */
    function abrir(sec) {
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      document.getElementById(sec).classList.add('active');
    }

    /* ================= PRODUTO ================= */

    function renderProduto() {
      const acao = document.getElementById("acaoProduto").value;
      const div = document.getElementById("formProduto");

      if (acao === "buscar") {
        div.innerHTML = `
          <input id="idProduto" placeholder="ID do produto">
          <button class="action" onclick="buscarProduto()">Buscar</button>
        `;
      }

      if (acao === "criar") {
        div.innerHTML = `
          <input id="nomeProduto" placeholder="Nome">
          <input id="descricaoProduto" placeholder="Descrição">
          <input id="precoProduto" placeholder="Preço">

          <h4>Categorias</h4>
          <div id="categoriasBox"></div>

          <button class="action" onclick="criarProduto()">Criar Produto</button>
        `;

        carregarCategorias();
      }

      if (acao === "deletar") {
        div.innerHTML = `
          <input id="idProdutoDel" placeholder="ID do produto">
          <button class="action" onclick="deletarProduto()">Deletar</button>
        `;
      }
    }

    /* ================= CATEGORIA ================= */

    function renderCategoria() {
      const acao = document.getElementById("acaoCategoria").value;
      const div = document.getElementById("formCategoria");

      if (acao === "buscar") {
        div.innerHTML = `
          <input id="idCategoria" placeholder="ID da categoria">
          <button class="action" onclick="buscarCategoria()">Buscar</button>
        `;
      }

      if (acao === "criar") {
        div.innerHTML = `
          <input id="nomeCategoria" placeholder="Nome da categoria">
          <button class="action" onclick="criarCategoria()">Criar</button>
        `;
      }

      if (acao === "deletar") {
        div.innerHTML = `
          <input id="idCategoriaDel" placeholder="ID da categoria">
          <button class="action" onclick="deletarCategoria()">Deletar</button>
        `;
      }
    }

    /* ================= CATEGORIAS MOCK ================= */

    const categoriasMock = [
      { id: 1, nome: "Comida" },
      { id: 2, nome: "Bebidas" },
      { id: 3, nome: "Fast Food" }
    ];

    function carregarCategorias() {
      const box = document.getElementById("categoriasBox");
      box.innerHTML = "";

      categoriasMock.forEach(c => {
        box.innerHTML += `
          <label>
            <input type="checkbox" value="${c.id}">
            ${c.nome}
          </label>
        `;
      });
    }

    /* ================= PRODUTO API ================= */

    function criarProduto() {

      const nome = document.getElementById("nomeProduto").value;
      const descricao = document.getElementById("descricaoProduto").value;
      const preco = document.getElementById("precoProduto").value;

      const categorias = Array.from(
        document.querySelectorAll("#categoriasBox input:checked")
      ).map(c => ({ id: Number(c.value) }));

      fetch(API + "/products", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          name: nome,
          description: descricao,
          price: Number(preco),
          categories: categorias
        })
      })
      .then(r => r.json())
      .then(() => alert("Produto criado"));
    }

    function buscarProduto() {
      const id = document.getElementById("idProduto").value;
      fetch(API + "/products/" + id)
      .then(r => r.json())
      .then(d => console.log(d));
    }

    function deletarProduto() {
      const id = document.getElementById("idProdutoDel").value;
      fetch(API + "/products/" + id, { method: "DELETE" })
      .then(() => alert("Deletado"));
    }

    /* ================= CATEGORIA API ================= */

    function criarCategoria() {
      const nome = document.getElementById("nomeCategoria").value;

      fetch(API + "/categories", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name: nome })
      })
      .then(() => alert("Categoria criada"));
    }

    function buscarCategoria() {
      const id = document.getElementById("idCategoria").value;
      fetch(API + "/categories/" + id)
      .then(r => r.json())
      .then(d => console.log(d));
    }

    function deletarCategoria() {
      const id = document.getElementById("idCategoriaDel").value;
      fetch(API + "/categories/" + id, { method: "DELETE" })
      .then(() => alert("Deletado"));
    }

    /* INIT */
    renderProduto();
    renderCategoria();

</script>

</body>
</html>
