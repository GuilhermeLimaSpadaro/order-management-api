<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Order App</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      display: flex;
      background: #f4f6f8;
    }

    /* LEFT */
    .left {
      width: 65%;
      padding: 20px;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .card {
      background: white;
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .card:hover {
      transform: scale(1.02);
    }

    /* RIGHT CART */
    .cart {
      width: 35%;
      background: #111827;
      color: white;
      padding: 20px;
      height: 100vh;
    }

    .item {
      background: #1f2937;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 6px;
    }

    button {
      width: 100%;
      padding: 10px;
      border: none;
      margin-top: 10px;
      cursor: pointer;
    }

    .buy {
      background: #22c55e;
    }

    .clear {
      background: #ef4444;
    }
  </style>
</head>

<body>

<div class="left">
  <h2>Produtos</h2>
  <div id="products" class="products"></div>
</div>

<div class="cart">
  <h2>Carrinho</h2>
  <div id="cart"></div>

  <input id="userId" placeholder="User ID">

  <button class="buy" onclick="checkout()">Finalizar Pedido</button>
  <button class="clear" onclick="clearCart()">Limpar</button>

  <pre id="out"></pre>
</div>

<script>

  const API = "https://order-management-production-20f1.up.railway.app";

  let cart = [];

  /* CARREGA PRODUTOS */
  function loadProducts() {
    fetch(`${API}/products`)
      .then(r => r.json())
      .then(data => {
        const container = document.getElementById("products");
        container.innerHTML = "";

        data.forEach(p => {
          const div = document.createElement("div");
          div.className = "card";
          div.innerHTML = `
            <b>${p.name}</b><br>
            R$ ${p.price}
          `;

          div.onclick = () => addToCart(p);

          container.appendChild(div);
        });
      });
  }

  /* ADD CARRINHO */
  function addToCart(product) {
    cart.push(product);
    renderCart();
  }

  /* RENDER CART */
  function renderCart() {
    const container = document.getElementById("cart");
    container.innerHTML = "";

    cart.forEach((p, i) => {
      const div = document.createElement("div");
      div.className = "item";
      div.innerHTML = `
        ${p.name} - R$ ${p.price}
      `;
      container.appendChild(div);
    });
  }

  /* LIMPAR */
  function clearCart() {
    cart = [];
    renderCart();
  }

  /* CHECKOUT REAL */
  function checkout() {

    if (cart.length === 0) return;

    const order = {
      moment: new Date().toISOString(),
      orderStatus: "WAITING_PAYMENT",
      client: { id: Number(userId.value) },
      items: cart.map(p => ({
        product: { id: p.id },
        quantity: 1,
        price: p.price
      }))
    };

    fetch(`${API}/orders`, {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify(order)
    })
    .then(r => r.json())
    .then(data => {
      out.innerText = JSON.stringify(data, null, 2);
      clearCart();
    });
  }

  /* INIT */
  loadProducts();

</script>

</body>
</html>
