<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel API</title>

    <style>
        * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
          font-family: Arial;
        }

        body {
          display: flex;
          height: 100vh;
          background: #f4f6f9;
        }

        .sidebar {
          width: 220px;
          background: #111827;
          color: white;
          padding: 20px;
        }

        .sidebar h2 {
          margin-bottom: 20px;
        }

        .sidebar button {
          width: 100%;
          padding: 10px;
          margin-bottom: 10px;
          background: #1f2937;
          border: none;
          color: white;
          cursor: pointer;
          border-radius: 6px;
        }

        .sidebar button:hover {
          background: #374151;
        }

        .main {
          flex: 1;
          padding: 20px;
        }

        .card {
          background: white;
          padding: 20px;
          border-radius: 10px;
          max-width: 700px;
          box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        input {
          width: 100%;
          padding: 10px;
          margin-bottom: 10px;
          border-radius: 6px;
          border: 1px solid #ddd;
        }

        button.action {
          width: 100%;
          padding: 10px;
          background: #2563eb;
          color: white;
          border: none;
          border-radius: 6px;
          cursor: pointer;
        }

        .section { display: none; }
        .active { display: block; }

        label { display:block; margin-bottom:5px; }
    </style>
</head>

<body>

<div class="sidebar">
    <h2>PAINEL API</h2>

    <button onclick="abrir('produto')">Produto</button>
    <button onclick="abrir('categoria')">Categoria</button>
    <button onclick="abrir('usuario')">Usuário</button>
    <button onclick="abrir('pedido')">Pedido</button>
</div>

<div class="main">

    <!-- PRODUTO -->
    <div id="produto" class="section active">
        <div class="card">

            <h2>Produto</h2>

            <select onchange="renderProduto()" id="acaoProduto">
                <option value="buscar">Buscar</option>
                <option value="criar">Criar</option>
                <option value="deletar">Deletar</option>
            </select>

            <div id="formProduto"></div>

        </div>
    </div>

    <!-- CATEGORIA -->
    <div id="categoria" class="section">
        <div class="card">

            <h2>Categoria</h2>

            <select onchange="renderCategoria()" id="acaoCategoria">
                <option value="buscar">Buscar</option>
                <option value="criar">Criar</option>
                <option value="deletar">Deletar</option>
            </select>

            <div id="formCategoria"></div>

        </div>
    </div>

    <!-- USUÁRIO -->
    <div id="usuario" class="section">
        <div class="card">

            <h2>Usuário</h2>

            <select onchange="renderUsuario()" id="acaoUsuario">
                <option value="buscar">Buscar</option>
                <option value="criar">Criar</option>
                <option value="deletar">Deletar</option>
            </select>

            <div id="formUsuario"></div>

        </div>
    </div>

    <!-- PEDIDO -->
    <div id="pedido" class="section">
        <div class="card">

            <h2>Pedido</h2>

            <select onchange="renderPedido()" id="acaoPedido">
                <option value="buscar">Buscar</option>
                <option value="criar">Criar</option>
                <option value="deletar">Deletar</option>
            </select>

            <div id="formPedido"></div>

        </div>
    </div>

</div>

<script>

    const API = "http://localhost:8080";

    /* MENU */
    function abrir(sec) {
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      document.getElementById(sec).classList.add('active');
    }

    /* ================= PRODUTO ================= */

    function renderProduto() {
      const a = document.getElementById("acaoProduto").value;
      const d = document.getElementById("formProduto");

      if (a === "buscar") {
        d.innerHTML = `<input id="idProduto" placeholder="ID"><button class="action" onclick="buscarProduto()">Buscar</button>`;
      }

      if (a === "criar") {
        d.innerHTML = `
          <input id="p_nome" placeholder="Nome">
          <input id="p_desc" placeholder="Descrição">
          <input id="p_preco" placeholder="Preço">
          <button class="action" onclick="criarProduto()">Criar</button>
        `;
      }

      if (a === "deletar") {
        d.innerHTML = `<input id="idProdutoDel" placeholder="ID"><button class="action" onclick="deletarProduto()">Deletar</button>`;
      }
    }

    /* ================= CATEGORIA ================= */

    function renderCategoria() {
      const a = document.getElementById("acaoCategoria").value;
      const d = document.getElementById("formCategoria");

      if (a === "buscar") {
        d.innerHTML = `<input id="idCategoria" placeholder="ID"><button class="action" onclick="buscarCategoria()">Buscar</button>`;
      }

      if (a === "criar") {
        d.innerHTML = `
          <input id="c_nome" placeholder="Nome categoria">
          <button class="action" onclick="criarCategoria()">Criar</button>
        `;
      }

      if (a === "deletar") {
        d.innerHTML = `<input id="idCategoriaDel" placeholder="ID"><button class="action" onclick="deletarCategoria()">Deletar</button>`;
      }
    }

    /* ================= USUÁRIO ================= */

    function renderUsuario() {
      const a = document.getElementById("acaoUsuario").value;
      const d = document.getElementById("formUsuario");

      if (a === "buscar") {
        d.innerHTML = `<input id="idUsuario" placeholder="ID"><button class="action" onclick="buscarUsuario()">Buscar</button>`;
      }

      if (a === "criar") {
        d.innerHTML = `
          <input id="u_nome" placeholder="Nome">
          <input id="u_email" placeholder="Email">
          <input id="u_phone" placeholder="Telefone">
          <input id="u_pass" placeholder="Senha">
          <button class="action" onclick="criarUsuario()">Criar</button>
        `;
      }

      if (a === "deletar") {
        d.innerHTML = `<input id="idUsuarioDel" placeholder="ID"><button class="action" onclick="deletarUsuario()">Deletar</button>`;
      }
    }

    /* ================= PEDIDO ================= */

    function renderPedido() {
      const a = document.getElementById("acaoPedido").value;
      const d = document.getElementById("formPedido");

      if (a === "buscar") {
        d.innerHTML = `<input id="idPedido" placeholder="ID"><button class="action" onclick="buscarPedido()">Buscar</button>`;
      }

      if (a === "criar") {
        d.innerHTML = `
          <input id="p_client" placeholder="ID do usuário (cliente)">
          <input id="p_status" placeholder="Status (0,1,2...)">
          <input id="p_moment" placeholder="Data (2026-06-04T20:00:00)">
          <button class="action" onclick="criarPedido()">Criar</button>
        `;
      }

      if (a === "deletar") {
        d.innerHTML = `<input id="idPedidoDel" placeholder="ID"><button class="action" onclick="deletarPedido()">Deletar</button>`;
      }
    }

    /* ================= API ================= */

    // PRODUTO
    function criarProduto(){
      fetch(API+"/products",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({
        name: p_nome.value,
        description: p_desc.value,
        price: Number(p_preco.value)
      })})
    }

    function buscarProduto(){ fetch(API+"/products/"+idProduto.value).then(r=>r.json()).then(console.log) }
    function deletarProduto(){ fetch(API+"/products/"+idProdutoDel.value,{method:"DELETE"}) }

    // CATEGORIA
    function criarCategoria(){
      fetch(API+"/categories",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({
        name: c_nome.value
      })})
    }

    function buscarCategoria(){ fetch(API+"/categories/"+idCategoria.value).then(r=>r.json()).then(console.log) }
    function deletarCategoria(){ fetch(API+"/categories/"+idCategoriaDel.value,{method:"DELETE"}) }

    // USUÁRIO
    function criarUsuario(){
      fetch(API+"/users",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({
        name:u_nome.value,
        email:u_email.value,
        phone:u_phone.value,
        password:u_pass.value
      })})
    }

    function buscarUsuario(){ fetch(API+"/users/"+idUsuario.value).then(r=>r.json()).then(console.log) }
    function deletarUsuario(){ fetch(API+"/users/"+idUsuarioDel.value,{method:"DELETE"}) }

    // PEDIDO
    function criarPedido(){
      fetch(API+"/orders",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({
        client:{id:Number(p_client.value)},
        orderStatus:Number(p_status.value),
        moment:p_moment.value
      })})
    }

    function buscarPedido(){ fetch(API+"/orders/"+idPedido.value).then(r=>r.json()).then(console.log) }
    function deletarPedido(){ fetch(API+"/orders/"+idPedidoDel.value,{method:"DELETE"}) }

    /* INIT */
    renderProduto();
    renderCategoria();
    renderUsuario();
    renderPedido();

</script>

</body>
</html>
