<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Order Manager App</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      display: flex;
      background: #f4f6f8;
    }

    .sidebar {
      width: 240px;
      background: #111827;
      color: white;
      height: 100vh;
      padding: 20px;
    }

    .sidebar button {
      width: 100%;
      margin-bottom: 10px;
      padding: 10px;
      border: none;
      background: #1f2937;
      color: white;
      cursor: pointer;
    }

    .main {
      flex: 1;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    input {
      width: 100%;
      margin: 5px 0;
      padding: 8px;
    }

    button.action {
      width: 100%;
      padding: 10px;
      background: #2563eb;
      color: white;
      border: none;
      cursor: pointer;
    }

    button.danger {
      background: #dc2626;
    }

    pre {
      background: #111;
      color: #0f0;
      padding: 10px;
      overflow: auto;
    }

    .hidden { display: none; }
  </style>
</head>

<body>

<div class="sidebar">
  <h2>ORDER APP</h2>

  <button onclick="show('users')">Users</button>
  <button onclick="show('products')">Products</button>
  <button onclick="show('categories')">Categories</button>
  <button onclick="show('orders')">Orders</button>
  <button onclick="show('payments')">Payments</button>
</div>

<div class="main">

  <!-- USERS -->
  <div id="users" class="card">
    <h2>Users</h2>

    <input id="uId" placeholder="ID">
    <button onclick="getUser()">GET</button>
    <button onclick="deleteUser()" class="danger">DELETE</button>

    <input id="uName" placeholder="Name">
    <button onclick="createUser()">CREATE</button>
    <button onclick="updateUser()">UPDATE</button>

    <pre id="userOut"></pre>
  </div>

  <!-- PRODUCTS -->
  <div id="products" class="card hidden">
    <h2>Products</h2>

    <input id="pId" placeholder="ID">
    <button onclick="getProduct()">GET</button>
    <button onclick="deleteProduct()" class="danger">DELETE</button>

    <input id="pName" placeholder="Name">
    <input id="pPrice" placeholder="Price">

    <button onclick="createProduct()">CREATE</button>
    <button onclick="updateProduct()">UPDATE</button>

    <pre id="productOut"></pre>
  </div>

  <!-- CATEGORIES -->
  <div id="categories" class="card hidden">
    <h2>Categories</h2>

    <input id="cId" placeholder="ID">
    <button onclick="getCategory()">GET</button>
    <button onclick="deleteCategory()" class="danger">DELETE</button>

    <input id="cName" placeholder="Name">

    <button onclick="createCategory()">CREATE</button>
    <button onclick="updateCategory()">UPDATE</button>

    <pre id="categoryOut"></pre>
  </div>

  <!-- ORDERS -->
  <div id="orders" class="card hidden">
    <h2>Orders</h2>

    <input id="oId" placeholder="Order ID">
    <button onclick="getOrder()">GET</button>

    <hr>

    <input id="oUser" placeholder="User ID">
    <input id="oProduct" placeholder="Product ID">
    <input id="oQty" placeholder="Quantity">
    <input id="oPrice" placeholder="Price">

    <button onclick="createOrder()">CREATE ORDER</button>

    <pre id="orderOut"></pre>
  </div>

  <!-- PAYMENTS -->
  <div id="payments" class="card hidden">
    <h2>Payments</h2>

    <input id="payOrder" placeholder="Order ID">
    <button onclick="payOrder()">PAY ORDER</button>

    <pre id="paymentOut"></pre>
  </div>

</div>

<script>

  const API = "https://order-management-production-20f1.up.railway.app";

  function show(id) {
    document.querySelectorAll('.card').forEach(c => c.classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');
  }

  /* ========== USERS ========== */
  function createUser() {
    fetch(`${API}/users`, {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ name: uName.value })
    }).then(r=>r.json()).then(d=>userOut.innerText=JSON.stringify(d,null,2));
  }

  function getUser() {
    fetch(`${API}/users/${uId.value}`)
    .then(r=>r.json()).then(d=>userOut.innerText=JSON.stringify(d,null,2));
  }

  function updateUser() {
    fetch(`${API}/users/${uId.value}`, {
      method: "PUT",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ name: uName.value })
    }).then(r=>r.json()).then(d=>userOut.innerText=JSON.stringify(d,null,2));
  }

  function deleteUser() {
    fetch(`${API}/users/${uId.value}`, { method: "DELETE" })
    .then(()=>userOut.innerText="Deleted");
  }

  /* ========== PRODUCTS ========== */
  function createProduct() {
    fetch(`${API}/products`, {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        name: pName.value,
        price: Number(pPrice.value)
      })
    }).then(r=>r.json()).then(d=>productOut.innerText=JSON.stringify(d,null,2));
  }

  function getProduct() {
    fetch(`${API}/products/${pId.value}`)
    .then(r=>r.json()).then(d=>productOut.innerText=JSON.stringify(d,null,2));
  }

  function updateProduct() {
    fetch(`${API}/products/${pId.value}`, {
      method: "PUT",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        name: pName.value,
        price: Number(pPrice.value)
      })
    }).then(r=>r.json()).then(d=>productOut.innerText=JSON.stringify(d,null,2));
  }

  function deleteProduct() {
    fetch(`${API}/products/${pId.value}`, { method: "DELETE" })
    .then(()=>productOut.innerText="Deleted");
  }

  /* ========== CATEGORIES ========== */
  function createCategory() {
    fetch(`${API}/categories`, {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ name: cName.value })
    }).then(r=>r.json()).then(d=>categoryOut.innerText=JSON.stringify(d,null,2));
  }

  function getCategory() {
    fetch(`${API}/categories/${cId.value}`)
    .then(r=>r.json()).then(d=>categoryOut.innerText=JSON.stringify(d,null,2));
  }

  function updateCategory() {
    fetch(`${API}/categories/${cId.value}`, {
      method: "PUT",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ name: cName.value })
    }).then(r=>r.json()).then(d=>categoryOut.innerText=JSON.stringify(d,null,2));
  }

  function deleteCategory() {
    fetch(`${API}/categories/${cId.value}`, { method: "DELETE" })
    .then(()=>categoryOut.innerText="Deleted");
  }

  /* ========== ORDERS ========== */
  function createOrder() {

    const order = {
      moment: new Date().toISOString(),
      orderStatus: "WAITING_PAYMENT",
      client: { id: Number(oUser.value) },
      items: [
        {
          product: { id: Number(oProduct.value) },
          quantity: Number(oQty.value),
          price: Number(oPrice.value)
        }
      ]
    };

    fetch(`${API}/orders`, {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify(order)
    })
    .then(r=>r.json())
    .then(d=>orderOut.innerText=JSON.stringify(d,null,2));
  }

  function getOrder() {
    fetch(`${API}/orders/${oId.value}`)
    .then(r=>r.json())
    .then(d=>orderOut.innerText=JSON.stringify(d,null,2));
  }

  /* ========== PAYMENTS ========== */
  function payOrder() {
    fetch(`${API}/payments`, {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ orderId: Number(payOrder.value) })
    })
    .then(r=>r.json())
    .then(d=>paymentOut.innerText=JSON.stringify(d,null,2));
  }

</script>

</body>
</html>
