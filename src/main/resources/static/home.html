<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>API Dashboard</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial;
    }

    body {
      display: flex;
      height: 100vh;
      background: #f4f6f9;
    }

    /* SIDEBAR */
    .sidebar {
      width: 220px;
      background: #111827;
      color: white;
      padding: 20px;
    }

    .sidebar h2 {
      margin-bottom: 20px;
      font-size: 18px;
    }

    .sidebar button {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      background: #1f2937;
      border: none;
      color: white;
      cursor: pointer;
      border-radius: 6px;
    }

    .sidebar button:hover {
      background: #374151;
    }

    /* MAIN */
    .main {
      flex: 1;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      max-width: 600px;
    }

    /* INPUTS */
    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
    }

    button.action {
      width: 100%;
      padding: 10px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    button.action:hover {
      background: #1d4ed8;
    }

    .section {
      display: none;
    }

    .active {
      display: block;
    }

    label {
      display: block;
      margin-bottom: 5px;
    }
  </style>
</head>

<body>

<div class="sidebar">
  <h2>API TEST</h2>
  <button onclick="show('product')">Product</button>
  <button onclick="show('category')">Category</button>
</div>

<div class="main">

  <!-- PRODUCT -->
  <div id="product" class="section active">
    <div class="card">
      <h2>Create Product</h2>

      <input id="p_name" placeholder="Name">
      <input id="p_desc" placeholder="Description">
      <input id="p_price" placeholder="Price">

      <h4>Categories</h4>
      <div id="cat_box"></div>

      <button class="action" onclick="createProduct()">Create Product</button>
    </div>
  </div>

  <!-- CATEGORY -->
  <div id="category" class="section">
    <div class="card">
      <h2>Create Category</h2>

      <input id="c_name" placeholder="Category name">

      <button class="action" onclick="createCategory()">Create Category</button>
    </div>
  </div>

</div>

<script>

  const API = "http://localhost:8080"; // troca aqui

  const categoriesMock = [
    { id: 1, name: "Food" },
    { id: 2, name: "Drinks" },
    { id: 3, name: "Fast Food" }
  ];

  function show(section) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById(section).classList.add('active');
  }

  /* LOAD CATEGORIES */
  function loadCategories() {
    const box = document.getElementById("cat_box");
    box.innerHTML = "";

    categoriesMock.forEach(c => {
      box.innerHTML += `
        <label>
          <input type="checkbox" value="${c.id}">
          ${c.name}
        </label>
      `;
    });
  }

  loadCategories();

  /* CREATE PRODUCT */
  function createProduct() {

    const name = document.getElementById("p_name").value;
    const description = document.getElementById("p_desc").value;
    const price = document.getElementById("p_price").value;

    const categories = Array.from(
      document.querySelectorAll("#cat_box input:checked")
    ).map(c => ({ id: Number(c.value) }));

    const payload = {
      name,
      description,
      price: Number(price),
      categories
    };

    fetch(API + "/products", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    })
    .then(r => r.json())
    .then(d => alert("Product created"))
    .catch(e => alert("Error"));
  }

  /* CREATE CATEGORY */
  function createCategory() {

    const name = document.getElementById("c_name").value;

    fetch(API + "/categories", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name })
    })
    .then(r => r.json())
    .then(d => alert("Category created"))
    .catch(e => alert("Error"));
  }

</script>

</body>
</html>
