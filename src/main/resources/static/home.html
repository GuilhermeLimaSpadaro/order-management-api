<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>API Debug Tester</title>

    <style>
        body {
          margin: 0;
          font-family: Arial;
          display: flex;
          background: #0b1220;
          color: white;
        }

        .sidebar {
          width: 260px;
          background: #111827;
          height: 100vh;
          padding: 20px;
        }

        .sidebar button {
          width: 100%;
          margin-bottom: 10px;
          padding: 10px;
          border: 0;
          cursor: pointer;
          background: #1f2937;
          color: white;
        }

        .sidebar button:hover {
          background: #374151;
        }

        .main {
          flex: 1;
          padding: 20px;
        }

        .card {
          background: #111827;
          padding: 15px;
          margin-bottom: 15px;
          border-radius: 8px;
          border: 1px solid #374151;
        }

        input {
          width: 100%;
          padding: 8px;
          margin: 5px 0;
        }

        button.action {
          width: 100%;
          padding: 10px;
          margin-top: 5px;
          border: 0;
          cursor: pointer;
          background: #2563eb;
          color: white;
        }

        pre {
          background: black;
          padding: 10px;
          overflow: auto;
          color: #22c55e;
        }

        .status {
          font-weight: bold;
        }
    </style>
</head>

<body>

<div class="sidebar">
    <h3>API DEBUG</h3>

    <button onclick="show('users')">Users</button>
    <button onclick="show('products')">Products</button>
    <button onclick="show('categories')">Categories</button>
    <button onclick="show('orders')">Orders</button>
</div>

<div class="main">

    <!-- USERS -->
    <div id="users" class="card">
        <h3>USERS</h3>

        <input id="u_id" placeholder="ID">
        <input id="u_name" placeholder="Name">
        <input id="u_email" placeholder="Email">

        <button class="action" onclick="getUser()">GET BY ID</button>
        <button class="action" onclick="getUsers()">GET ALL</button>
        <button class="action" onclick="createUser()">POST</button>
        <button class="action" onclick="updateUser()">PUT</button>
        <button class="action" onclick="deleteUser()">DELETE</button>

        <pre id="userOut"></pre>
    </div>

    <!-- PRODUCTS -->
    <div id="products" class="card" style="display:none">
        <h3>PRODUCTS</h3>

        <input id="p_id">
        <input id="p_name">
        <input id="p_price">

        <button class="action" onclick="getProduct()">GET BY ID</button>
        <button class="action" onclick="getProducts()">GET ALL</button>
        <button class="action" onclick="createProduct()">POST</button>
        <button class="action" onclick="updateProduct()">PUT</button>
        <button class="action" onclick="deleteProduct()">DELETE</button>

        <pre id="productOut"></pre>
    </div>

    <!-- CATEGORIES -->
    <div id="categories" class="card" style="display:none">
        <h3>CATEGORIES</h3>

        <input id="c_id">
        <input id="c_name">

        <button class="action" onclick="getCategory()">GET BY ID</button>
        <button class="action" onclick="getCategories()">GET ALL</button>
        <button class="action" onclick="createCategory()">POST</button>
        <button class="action" onclick="updateCategory()">PUT</button>
        <button class="action" onclick="deleteCategory()">DELETE</button>

        <pre id="categoryOut"></pre>
    </div>

    <!-- ORDERS -->
    <div id="orders" class="card" style="display:none">
        <h3>ORDERS</h3>

        <input id="o_id">
        <input id="o_userId">
        <input id="o_productId">
        <input id="o_qty">
        <input id="o_price">

        <button class="action" onclick="createOrder()">POST</button>
        <button class="action" onclick="getOrder()">GET BY ID</button>
        <button class="action" onclick="getOrders()">GET ALL</button>
        <button class="action" onclick="updateOrder()">PUT</button>
        <button class="action" onclick="deleteOrder()">DELETE</button>

        <pre id="orderOut"></pre>
    </div>

</div>

<script>

    const API = "https://order-management-production-20f1.up.railway.app";

    function show(id){
      document.querySelectorAll('.card').forEach(c => c.style.display='none');
      document.getElementById(id).style.display='block';
    }

    /* ================== FETCH DEBUG ================== */
    async function request(url, options){
      try {
        const res = await fetch(url, options);
        const text = await res.text();

        let data;
        try {
          data = JSON.parse(text);
        } catch {
          data = text;
        }

        return {
          status: res.status,
          ok: res.ok,
          data
        };

      } catch (err) {
        return {
          status: 0,
          ok: false,
          data: "NETWORK ERROR: " + err.message
        };
      }
    }

    /* ================= USERS ================= */
    async function getUser(){
    const r = await request(`${API}/users/${u_id.value}`);
    userOut(r);
    }

    async function getUsers(){
    const r = await request(`${API}/users`);
    userOut(r);
    }

    async function createUser(){
    const r = await request(`${API}/users`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
    name:u_name.value,
    email:u_email.value
    })
    });
    userOut(r);
    }

    async function updateUser(){
    const r = await request(`${API}/users/${u_id.value}`,{
    method:"PUT",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
    name:u_name.value,
    email:u_email.value
    })
    });
    userOut(r);
    }

    async function deleteUser(){
    const r = await request(`${API}/users/${u_id.value}`,{method:"DELETE"});
    userOut(r);
    }

    function userOut(r){
    document.getElementById("userOut").innerText =
    `STATUS: ${r.status}\nOK: ${r.ok}\n\n` +
    JSON.stringify(r.data,null,2);
    }

    /* ================= PRODUCTS ================= */
    async function getProduct(){
    const r = await request(`${API}/products/${p_id.value}`);
    productOut(r);
    }

    async function getProducts(){
    const r = await request(`${API}/products`);
    productOut(r);
    }

    async function createProduct(){
    const r = await request(`${API}/products`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
    name:p_name.value,
    price:Number(p_price.value)
    })
    });
    productOut(r);
    }

    async function updateProduct(){
    const r = await request(`${API}/products/${p_id.value}`,{
    method:"PUT",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
    name:p_name.value,
    price:Number(p_price.value)
    })
    });
    productOut(r);
    }

    async function deleteProduct(){
    const r = await request(`${API}/products/${p_id.value}`,{method:"DELETE"});
    productOut(r);
    }

    function productOut(r){
    document.getElementById("productOut").innerText =
    `STATUS: ${r.status}\nOK: ${r.ok}\n\n` +
    JSON.stringify(r.data,null,2);
    }

    /* ================= CATEGORIES ================= */
    async function getCategory(){
    const r = await request(`${API}/categories/${c_id.value}`);
    categoryOut(r);
    }

    async function getCategories(){
    const r = await request(`${API}/categories`);
    categoryOut(r);
    }

    async function createCategory(){
    const r = await request(`${API}/categories`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({name:c_name.value})
    });
    categoryOut(r);
    }

    async function updateCategory(){
    const r = await request(`${API}/categories/${c_id.value}`,{
    method:"PUT",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({name:c_name.value})
    });
    categoryOut(r);
    }

    async function deleteCategory(){
    const r = await request(`${API}/categories/${c_id.value}`,{method:"DELETE"});
    categoryOut(r);
    }

    function categoryOut(r){
    document.getElementById("categoryOut").innerText =
    `STATUS: ${r.status}\nOK: ${r.ok}\n\n` +
    JSON.stringify(r.data,null,2);
    }

    /* ================= ORDERS ================= */
    async function createOrder(){

    const order = {
    moment:new Date().toISOString(),
    orderStatus:"WAITING_PAYMENT",
    client:{id:Number(o_userId.value)},
    items:[{
    product:{id:Number(o_productId.value)},
    quantity:Number(o_qty.value),
    price:Number(o_price.value)
    }]
    };

    const r = await request(`${API}/orders`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(order)
    });

    orderOut(r);
    }

    async function getOrder(){
    const r = await request(`${API}/orders/${o_id.value}`);
    orderOut(r);
    }

    async function getOrders(){
    const r = await request(`${API}/orders`);
    orderOut(r);
    }

    async function updateOrder(){
    const r = await request(`${API}/orders/${o_id.value}`,{
    method:"PUT",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({orderStatus:"PAID"})
    });
    orderOut(r);
    }

    async function deleteOrder(){
    const r = await request(`${API}/orders/${o_id.value}`,{method:"DELETE"});
    orderOut(r);
    }

    function orderOut(r){
    document.getElementById("orderOut").innerText =
    `STATUS: ${r.status}\nOK: ${r.ok}\n\n` +
    JSON.stringify(r.data,null,2);
    }

</script>

</body>
</html>
