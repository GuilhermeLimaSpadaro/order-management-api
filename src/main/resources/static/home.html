<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>CRUD Test Panel</title>

  <style>
    body {
        margin: 0;
        font-family: Arial;
        display: flex;
        height: 100vh;
    }

    /* MENU LATERAL */
    #menu {
        width: 220px;
        background: #1f1f1f;
        color: white;
        padding: 10px;
    }

    button {
        width: 100%;
        margin: 5px 0;
        padding: 10px;
        cursor: pointer;
    }

    /* ÁREA PRINCIPAL */
    #content {
        flex: 1;
        padding: 20px;
    }

    .section {
        display: none;
    }

    .active {
        display: block;
        background: #f4f4f4;
        padding: 15px;
        border-radius: 8px;
    }
  </style>
</head>

<body>

<div id="menu">
  <h3>CRUD PANEL</h3>

  <button onclick="openSection('users')">Users</button>
  <button onclick="openSection('products')">Products</button>
  <button onclick="openSection('orders')">Orders</button>
  <button onclick="openSection('categories')">Categories</button>
</div>

<div id="content">

  <!-- USERS -->
  <div id="users" class="section">
    <h2>Users</h2>

    <button onclick="showForm('users','getById')">Buscar por ID</button>
    <button onclick="showForm('users','getAll')">Buscar todos</button>
    <button onclick="showForm('users','insert')">Inserir</button>
    <button onclick="showForm('users','update')">Atualizar</button>
    <button onclick="showForm('users','delete')">Deletar</button>

    <div id="users-form"></div>
  </div>

  <!-- PRODUCTS -->
  <div id="products" class="section">
    <h2>Products</h2>

    <button onclick="showForm('products','getById')">Buscar por ID</button>
    <button onclick="showForm('products','getAll')">Buscar todos</button>
    <button onclick="showForm('products','insert')">Inserir</button>
    <button onclick="showForm('products','update')">Atualizar</button>
    <button onclick="showForm('products','delete')">Deletar</button>

    <div id="products-form"></div>
  </div>

  <!-- ORDERS -->
  <div id="orders" class="section">
    <h2>Orders</h2>

    <button onclick="showForm('orders','getById')">Buscar por ID</button>
    <button onclick="showForm('orders','getAll')">Buscar todos</button>
    <button onclick="showForm('orders','insert')">Inserir</button>
    <button onclick="showForm('orders','update')">Atualizar</button>
    <button onclick="showForm('orders','delete')">Deletar</button>

    <div id="orders-form"></div>
  </div>

  <!-- CATEGORIES -->
  <div id="categories" class="section">
    <h2>Categories</h2>

    <button onclick="showForm('categories','getById')">Buscar por ID</button>
    <button onclick="showForm('categories','getAll')">Buscar todos</button>
    <button onclick="showForm('categories','insert')">Inserir</button>
    <button onclick="showForm('categories','update')">Atualizar</button>
    <button onclick="showForm('categories','delete')">Deletar</button>

    <div id="categories-form"></div>
  </div>

</div>

<script>
  function openSection(id){
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
  }

  /* MOSTRA FORM DINÂMICO */
  function showForm(entity, action){
      const container = document.getElementById(entity + "-form");

      let html = `<h3>${action}</h3>`;

      if(action === "getById" || action === "delete") {
          html += `
              <input placeholder="ID"><br><br>
              <button>Executar</button>
          `;
      }

      if(action === "getAll") {
          html += `<button>Executar GET ALL</button>`;
      }

      if(action === "insert") {
          html += `
              <input placeholder="Nome"><br><br>
              <input placeholder="Email / Nome produto / etc"><br><br>
              <button>Inserir</button>
          `;
      }

      if(action === "update") {
          html += `
              <input placeholder="ID"><br><br>
              <input placeholder="Novo valor"><br><br>
              <button>Atualizar</button>
          `;
      }

      container.innerHTML = html;
  }
</script>

</body>
</html>
